opensky:
  base-url: http://localhost:8089
  interval-ms: 3600000
  timeouts:
    connect-ms: 2000
    read-ms: 5000

spring:
  security:
    oauth2:
      client:
        registration:
          opensky:
            client-id: test-client-id
            client-secret: test-client-secret
            authorization-grant-type: client_credentials
        provider:
          opensky:
            token-uri: http://localhost:8089/auth/token
