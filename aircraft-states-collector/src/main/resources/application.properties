# Common config (all profiles)
state-collector.interval=5m

mp.messaging.outgoing.aircraft-state-vectors.topic=aircraft.state.vectors

# Production profile
%prod.quarkus.rest-client.open-sky-client.url=https://opensky-network.org/api

%prod.quarkus.oidc-client.auth-server-url=https://auth.opensky-network.org/auth/realms/opensky-network
%prod.quarkus.oidc-client.client-id=${OPENSKY_CLIENT_ID}
%prod.quarkus.oidc-client.credentials.secret=${OPENSKY_CLIENT_SECRET}
%prod.quarkus.oidc-client.grant.type=client

%prod.mp.messaging.outgoing.aircraft-state-vectors.connector=smallrye-kafka
%prod.mp.messaging.outgoing.aircraft-state-vectors.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer

# Dev profile — real OpenSky + Kafka Dev Services
%dev.quarkus.rest-client.open-sky-client.url=https://opensky-network.org/api

%dev.quarkus.oidc-client.auth-server-url=https://auth.opensky-network.org/auth/realms/opensky-network
%dev.quarkus.oidc-client.client-id=${OPENSKY_CLIENT_ID:}
%dev.quarkus.oidc-client.credentials.secret=${OPENSKY_CLIENT_SECRET:}
%dev.quarkus.oidc-client.grant.type=client

%dev.mp.messaging.outgoing.aircraft-state-vectors.connector=smallrye-kafka
%dev.mp.messaging.outgoing.aircraft-state-vectors.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer

# Disable WireMock Dev Service in dev — we use the real API
%dev.quarkus.wiremock.devservices.enabled=false

# Test profile — WireMock + in-memory Kafka
%test.quarkus.rest-client.open-sky-client.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.oidc-client.auth-server-url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.oidc-client.discovery-enabled=false
%test.quarkus.oidc-client.token-path=/auth/token
%test.quarkus.oidc-client.early-tokens-acquisition=false
%test.quarkus.oidc-client.client-id=test-client-id
%test.quarkus.oidc-client.credentials.secret=test-client-secret
%test.mp.messaging.outgoing.aircraft-state-vectors.connector=smallrye-in-memory
